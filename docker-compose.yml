services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: finanzas-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Finanzas2026!}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - finanzas-data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: finanzas-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Finanzas2026!}"
    volumes:
      - ./database/init.sql:/init.sql:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Esperando que SQL Server este listo..."
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT @@VERSION"
        echo "Ejecutando script de inicializacion..."
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$$MSSQL_SA_PASSWORD" -C -i /init.sql
        echo "Listo."

volumes:
  finanzas-data:
    name: finanzas-data
