name: Deploy a MonsterASP

# Se dispara cuando:
#  - haces push a la rama main o master
#  - lo ejecutas manualmente desde la pestania Actions de GitHub
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Build + Deploy
    runs-on: windows-latest
    # Necesitamos Windows porque el proyecto usa .NET Framework 4.8

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      # ============================================================
      # FRONTEND: compilar Tailwind, copiar Chart.js, Lucide, fuentes
      # ============================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No usamos cache: 'npm' aqui para no requerir package-lock.json en el repo.
          # Si commiteas package-lock.json, podes agregar: cache: 'npm'

      - name: Instalar dependencias npm
        # Usamos "npm install" en vez de "npm ci" para que funcione con o sin lock file.
        # Si commiteas package-lock.json, podes cambiarlo a "npm ci" (mas rapido y reproducible).
        run: npm install

      - name: Compilar assets (Tailwind + libs)
        run: npm run build

      # ============================================================
      # BACKEND: restaurar NuGet, compilar MVC 5 con MSBuild
      # ============================================================
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restaurar paquetes NuGet
        run: nuget restore gestor_financiero.sln

      # ============================================================
      # SECRETS: inyectar credenciales en Web.Release.config
      # ============================================================
      - name: Inyectar cadena de conexion y credenciales SMTP
        shell: pwsh
        run: |
          $config = Get-Content Web.Release.config -Raw
          # Base de datos
          $config = $config.Replace('__DB_HOST__',      '${{ secrets.DB_HOST }}')
          $config = $config.Replace('__DB_NAME__',      '${{ secrets.DB_NAME }}')
          $config = $config.Replace('__DB_USER__',      '${{ secrets.DB_USER }}')
          $config = $config.Replace('__DB_PASSWORD__',  '${{ secrets.DB_PASSWORD }}')
          # SMTP (Gmail) y URL base para emails
          $config = $config.Replace('__SMTP_USER__',     '${{ secrets.SMTP_USER }}')
          $config = $config.Replace('__SMTP_PASSWORD__', '${{ secrets.SMTP_PASSWORD }}')
          $config = $config.Replace('__SMTP_FROM__',    '${{ secrets.SMTP_FROM }}')
          $config = $config.Replace('__APP_BASE_URL__', '${{ secrets.APP_BASE_URL }}')
          Set-Content Web.Release.config $config -NoNewline

      # ============================================================
      # MIGRACIONES: ejecuta cada archivo database/migration_*.sql que
      # NO haya sido aplicado antes contra la BD remota.
      #
      # Llevamos un registro en la tabla _AppliedMigrations. Cada vez
      # que se aplica un script, guardamos su nombre + fecha. En el
      # proximo deploy se saltea automaticamente lo ya aplicado.
      #
      # Las migraciones SIGUEN siendo idempotentes (IF NOT EXISTS) por
      # robustez, pero ya no se ejecutan dos veces.
      #
      # Si algun script falla, abortamos el deploy ANTES de subir los
      # binarios, asi no nos quedamos con codigo nuevo apuntando a una
      # BD vieja.
      # ============================================================
      - name: Aplicar migraciones SQL a la BD remota
        shell: pwsh
        env:
          DB_SERVER: ${{ secrets.DB_HOST_REMOTE }}
          DB_USER:   ${{ secrets.DB_USER }}
          DB_PASS:   ${{ secrets.DB_PASSWORD }}
          DB_NAME:   ${{ secrets.DB_NAME }}
        run: |
          # Diagnostico: verificar sqlcmd y conectividad
          Write-Host "Verificando sqlcmd..."
          $sqlcmdPath = (Get-Command sqlcmd -ErrorAction SilentlyContinue)?.Source
          if (-not $sqlcmdPath) {
            Write-Host "ERROR: sqlcmd no esta instalado en el runner." -ForegroundColor Red
            exit 1
          }
          Write-Host "  sqlcmd: $sqlcmdPath"

          Write-Host "Test de conexion a $env:DB_SERVER ..."
          $testOut = & sqlcmd -S "$env:DB_SERVER" -U "$env:DB_USER" -P "$env:DB_PASS" `
                              -d "$env:DB_NAME" -C -Q "SELECT 'CONEXION OK' AS test;" 2>&1
          $testOut | ForEach-Object { Write-Host "  $_" }
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: no se pudo conectar a la BD remota." -ForegroundColor Red
            Write-Host "Revisa los secrets DB_HOST_REMOTE, DB_USER, DB_PASSWORD, DB_NAME." -ForegroundColor Yellow
            exit 1
          }

          function Invoke-Sql([string]$Sql) {
            $out = & sqlcmd -S "$env:DB_SERVER" -U "$env:DB_USER" -P "$env:DB_PASS" `
                            -d "$env:DB_NAME" -C -Q $Sql 2>&1
            $rc = $LASTEXITCODE
            $out | ForEach-Object { Write-Host "    $_" }
            return $rc
          }
          function Invoke-SqlFile([string]$Path) {
            Write-Host "    [debug] archivo: $Path (existe=$([System.IO.File]::Exists($Path)))" -ForegroundColor DarkGray
            $out = & sqlcmd -S "$env:DB_SERVER" -U "$env:DB_USER" -P "$env:DB_PASS" `
                            -d "$env:DB_NAME" -C -i $Path 2>&1
            $rc = $LASTEXITCODE
            $out | ForEach-Object { Write-Host "    $_" }
            Write-Host "    [debug] sqlcmd exit code = $rc" -ForegroundColor DarkGray
            return $rc
          }
          function Invoke-SqlScalar([string]$Sql) {
            $out = & sqlcmd -S "$env:DB_SERVER" -U "$env:DB_USER" -P "$env:DB_PASS" `
                            -d "$env:DB_NAME" -C -h -1 -W -Q $Sql 2>&1
            $val = ($out | Where-Object { $_ -and ($_ -match '^\s*\d+\s*$') } | Select-Object -First 1)
            if ($val) { return $val.Trim() } else { return "" }
          }

          # 1. Asegurar que existe la tabla de tracking
          Write-Host ""
          Write-Host "Asegurando tabla _AppliedMigrations..." -ForegroundColor Cyan
          $bootstrap = "IF OBJECT_ID('dbo._AppliedMigrations', 'U') IS NULL CREATE TABLE _AppliedMigrations (nombre VARCHAR(200) NOT NULL PRIMARY KEY, aplicada_en DATETIME NOT NULL DEFAULT GETUTCDATE());"
          if ((Invoke-Sql $bootstrap) -ne 0) {
            Write-Host "ERROR creando _AppliedMigrations" -ForegroundColor Red
            exit 1
          }

          # 2. Iterar todas las migrations en orden alfabetico
          $migs = Get-ChildItem -Path "database" -Filter "migration_*.sql" | Sort-Object Name
          if (-not $migs) {
            Write-Host "No hay archivos migration_*.sql en database/." -ForegroundColor Yellow
            exit 0
          }
          Write-Host "Migraciones detectadas: $($migs.Count)"

          $aplicadas = 0
          $saltadas = 0
          foreach ($m in $migs) {
            $nombre = $m.Name
            $existe = Invoke-SqlScalar "SET NOCOUNT ON; SELECT COUNT(*) FROM _AppliedMigrations WHERE nombre = '$nombre';"
            if ($existe -eq '1') {
              Write-Host "  -- saltada: $nombre (ya aplicada)" -ForegroundColor DarkGray
              $saltadas++
              continue
            }

            Write-Host ""
            Write-Host "==> Aplicando $nombre" -ForegroundColor Cyan
            if ((Invoke-SqlFile $m.FullName) -ne 0) {
              Write-Host "ERROR aplicando $nombre. Abortando deploy." -ForegroundColor Red
              exit 1
            }

            # Registrar la migracion como aplicada
            $rc = Invoke-Sql "INSERT INTO _AppliedMigrations (nombre) VALUES ('$nombre');"
            if ($rc -ne 0) {
              Write-Host "ERROR registrando $nombre en _AppliedMigrations" -ForegroundColor Red
              exit 1
            }
            Write-Host "    registrada en _AppliedMigrations" -ForegroundColor Green
            $aplicadas++
          }

          Write-Host ""
          Write-Host "Migraciones aplicadas: $aplicadas | saltadas: $saltadas" -ForegroundColor Green

      # ============================================================
      # PUBLISH: MSBuild en Release a la carpeta publish/
      # Usamos ruta absoluta y todos los parametros que necesita WebPublish.
      # ============================================================
      - name: Build + Publish a carpeta
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'publish'
          Write-Host "Publicando a: $publishDir"

          msbuild gestor_financiero.csproj `
            /p:Configuration=Release `
            /p:Platform="AnyCPU" `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=FileSystem `
            /p:DeployDefaultTarget=WebPublish `
            /p:publishUrl="$publishDir" `
            /p:DeleteExistingFiles=true `
            /p:PrecompileBeforePublish=false `
            /p:LastUsedBuildConfiguration=Release `
            /p:VisualStudioVersion=17.0 `
            /verbosity:minimal

          if (-not (Test-Path $publishDir)) {
            Write-Host "ERROR: la carpeta publish no se genero." -ForegroundColor Red
            Write-Host "Contenido del proyecto:"
            Get-ChildItem -Recurse -Directory | Where-Object { $_.Name -like '*publish*' -or $_.Name -like '*bin*' } | Select-Object FullName
            exit 1
          }
          Write-Host "OK. Archivos generados:"
          Get-ChildItem $publishDir | Select-Object Name, Length

      # ============================================================
      # COPIAR ASSETS NPM al publish folder (MSBuild no los incluye
      # automaticamente porque no estan en el .csproj como <Content>)
      # ============================================================
      - name: Copiar assets de Tailwind/Lucide/Inter/Chart.js
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'publish'

          # Asegurar que existan las subcarpetas
          New-Item -ItemType Directory -Path "$publishDir\Content\css"   -Force | Out-Null
          New-Item -ItemType Directory -Path "$publishDir\Content\fonts" -Force | Out-Null
          New-Item -ItemType Directory -Path "$publishDir\Scripts"       -Force | Out-Null

          # Copiar todos los archivos generados por npm run build
          if (Test-Path "Content\css") {
            Copy-Item "Content\css\*" "$publishDir\Content\css\" -Recurse -Force
            Write-Host "Content/css/ copiado"
          }
          if (Test-Path "Content\fonts") {
            Copy-Item "Content\fonts\*" "$publishDir\Content\fonts\" -Recurse -Force
            Write-Host "Content/fonts/ copiado"
          }
          if (Test-Path "Scripts\chart.umd.min.js") {
            Copy-Item "Scripts\chart.umd.min.js" "$publishDir\Scripts\" -Force
            Write-Host "Scripts/chart.umd.min.js copiado"
          }
          if (Test-Path "Scripts\sweetalert2.min.js") {
            Copy-Item "Scripts\sweetalert2.min.js" "$publishDir\Scripts\" -Force
            Write-Host "Scripts/sweetalert2.min.js copiado"
          }
          if (Test-Path "Scripts\html2pdf.min.js") {
            Copy-Item "Scripts\html2pdf.min.js" "$publishDir\Scripts\" -Force
            Write-Host "Scripts/html2pdf.min.js copiado"
          }

          Write-Host ""
          Write-Host "Assets en publish/Content/css/:"
          Get-ChildItem "$publishDir\Content\css" | Select-Object Name, Length
          Write-Host ""
          Write-Host "Assets en publish/Content/fonts/:"
          Get-ChildItem "$publishDir\Content\fonts" | Select-Object Name, Length
          Write-Host ""
          Write-Host "Assets en publish/Scripts/:"
          Get-ChildItem "$publishDir\Scripts" | Select-Object Name, Length

      - name: Listar contenido de publish/ (debug)
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'publish'
          Write-Host "Total archivos en publish/:"
          (Get-ChildItem $publishDir -Recurse -File).Count
          Write-Host ""
          Write-Host "Estructura de primer nivel:"
          Get-ChildItem $publishDir | Format-Table Mode, Length, Name

      # ============================================================
      # FTP: subir el contenido de publish/ a MonsterASP /wwwroot
      # ============================================================
      - name: Deploy via FTP a MonsterASP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
          protocol: ftp

      - name: Resumen
        if: success()
        run: |
          Write-Host "============================================================" -ForegroundColor Green
          Write-Host "  Deploy completado." -ForegroundColor Green
          Write-Host "  Tu sitio: https://gestor-financiero.runasp.net" -ForegroundColor Green
          Write-Host "============================================================" -ForegroundColor Green
        shell: pwsh
